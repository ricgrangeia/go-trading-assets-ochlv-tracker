
networks:
  database:
    name: ${NETWORK_NAME}
    external: true
services:
  app:
    image: go-trades-market
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-trades-market
    environment:
      - POSTGRES_DSN=${POSTGRES_DSN}
      - PAIRS_OVERRIDE=${PAIRS_OVERRIDE}
      - DEBUG=${DEBUG}
    restart: unless-stopped
    user: "10001:10001"  # Add this user mapping to match the container's user ID
    networks:
      - database
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"